- title: "Project Manager"
  location: "Fully Remote"
  start_date: "March 2026"
  blurb: "Gutz Technologies is building AI-powered digital twins of the gut microbiome to understand — and ultimately help treat — severe autism-related difficulties in children. We've recently secured a major research grant, and we need a Project Manager to drive coordination from day one. You'll work across 6+ consortium sites, manage milestone tracking and reporting to our funder, and keep data-sharing agreements, budgets, and timelines on course. This is a high-ownership role at the center of a collaborative, multi-site research program: you'll be the person who makes sure a diverse team of scientists, engineers, and clinicians can do their best work together. Due to our small team size and strong technical focus, we also envision this as a technical position, interacting closely with both the ML and bioinformatics teams to help ingest, make sense of, and organize the large quantities of data we will be managing from across the consortium. Experience and creativity with using cutting-edge AI-integrated workflows and project management tools is a huge plus. Strong organizational instincts, comfort with scientific contexts, and a knack for keeping distributed teams aligned are essential."

- title: "Data Engineer"
  location: "Fully Remote"
  start_date: "March 2026"
  blurb: "Gutz Technologies is building the data infrastructure behind one of the largest multi-omics efforts ever aimed at understanding the microbiome's role in autism. As our Data Engineer, you'll design and maintain the databases and cloud systems that ingest, store, and serve metagenomic, metabolomic, proteomic, and clinical data from multiple longitudinal birth cohorts. You'll build pipelines with version control, batch annotations, LLM integration, and provenance tracking, making sure every sample is traceable from raw data to model-ready feature tables. You'll work closely with our bioinformatics and ML teams, as well as with collaborators across partner institutions, so clear communication and a collaborative mindset matter as much as technical skill. Fluency with cloud-native tooling (AWS/GCP/Azure) is essential, and experience with clinical and HIPAA-compliant data structures is a big plus."

- title: "ML Engineer"
  location: "Fully Remote"
  start_date: "June 2026"
  blurb: "Gutz Technologies builds predictive models that use longitudinal multi-omics data to forecast clinical outcomes from multi-omic biological data trajectories. We're looking for an ML Engineer to help train, validate, and scale these models across tens of thousands of subjects and multiple data modalities. You'll work on iterative model development, distributed GPU training, and building inference infrastructure that lets collaborating research teams run predictions on their own cohorts. This role sits at the intersection of our engineering and science teams — you'll partner closely with bioinformaticians, data engineers, and domain scientists to turn complex biological data into actionable models. If you want to do meaningful work at the frontier of biomedical AI as part of a tight, collaborative team, we'd love to hear from you."

- title: "Bioinformatician"
  location: "Fully Remote"
  start_date: "June 2026"
  blurb: "Gutz Technologies is looking for a bioinformatician to process, QC, and interpret a large incoming wave of shotgun metagenomics, proteomics, and metabolomics data from multiple cohorts. You'll run standardized bioinformatics pipelines, implement batch effect correction using reference standards, and work closely with our ML team to deliver clean, harmonized feature tables ready for digital twin modeling. This is a deeply collaborative role — you'll partner with data engineers, machine learning engineers, and scientists across multiple institutions to ensure data quality and consistency at every step. Familiarity with Seqera/Nextflow and experience with multi-cohort data integration is a real advantage. If you want to do rigorous computational biology in service of understanding how the early-life microbiome shapes health and developmental outcomes, this is the role."
